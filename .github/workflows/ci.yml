name: MLOps CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

    # -------------------------------
    # 1. Checkout repo
    # -------------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # -------------------------------
    # 2. Setup Python
    # -------------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # -------------------------------
    # 3. Install dependencies
    # -------------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8

    # -------------------------------
    # 4. Lint (code quality)
    # -------------------------------
    - name: Run flake8
      run: |
        flake8 src/ --max-line-length=120

    # -------------------------------
    # 5. Run tests
    # -------------------------------
    - name: Run tests
      run: |
        pytest tests/

    # -------------------------------
    # 6. Run pipeline (REAL test)
    # -------------------------------
    - name: Run training pipeline
      run: |
        python -m src.pipeline.train_pipeline

    # -------------------------------
    # 7. Validate outputs (CRITICAL)
    # -------------------------------
    - name: Validate outputs
      run: |
        test -f artifacts/reports/model_comparison.csv
        test -f models/kmeans/model.pkl
        test -f models/kmeans/scaler.pkl
        echo "Artifacts validated successfully"

    # -------------------------------
    # 8. Clean MLflow (avoid CI issues)
    # -------------------------------
    - name: Cleanup MLflow artifacts
      run: |
        rm -rf mlruns || true
        rm -f mlflow.db || true
